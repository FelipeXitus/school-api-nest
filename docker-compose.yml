version: "3.9"

services:
  api:
    build: .
    container_name: school_api
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: "file:./data/database.sqlite"
      PORT: 3000
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma db seed &&
        node dist/main.js
      "
